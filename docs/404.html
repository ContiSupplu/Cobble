<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found — Loom Launcher</title>
    <meta name="description" content="The page you're looking for doesn't exist.">
    <link rel="icon" href="assets/loom-icon.png" type="image/png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

    <!-- SPA Routing: Redirect /card/{id} paths to the card viewer -->
    <script>
        (function() {
            var path = window.location.pathname;
            // Match /card/{cardId} — redirect to /card/?id={cardId}
            var match = path.match(/^\/card\/([^\/]+)\/?$/);
            if (match) {
                window.location.replace('/card/?id=' + encodeURIComponent(match[1]));
                return; // stop rendering the 404 page
            }
        })();
    </script>

    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-card: rgba(255, 255, 255, 0.03);
            --border-subtle: rgba(255, 255, 255, 0.06);
            --border-hover: rgba(255, 255, 255, 0.12);
            --text-primary: #f0f0f5;
            --text-secondary: #8a8a9a;
            --text-tertiary: #55556a;
            --accent-amber: #d97706;
            --accent-orange: #f59e0b;
            --accent-red: #b91c1c;
            --gradient-netherite: linear-gradient(135deg, #d97706, #b91c1c);
            --gradient-netherite-soft: linear-gradient(135deg, rgba(217, 119, 6, 0.15), rgba(185, 28, 28, 0.15));
        }

        html { scroll-behavior: smooth; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ── Navigation ── */
        nav {
            position: fixed; top: 0; left: 0; right: 0; z-index: 100;
            padding: 0 2rem; height: 64px;
            display: flex; align-items: center; justify-content: space-between;
            background: rgba(10, 10, 15, 0.8);
            backdrop-filter: blur(20px) saturate(180%);
            border-bottom: 1px solid var(--border-subtle);
        }

        .nav-brand {
            display: flex; align-items: center; gap: 0.75rem;
            text-decoration: none; color: var(--text-primary);
        }
        .nav-brand img { width: 28px; height: 28px; border-radius: 6px; }
        .nav-brand span { font-weight: 600; font-size: 0.95rem; letter-spacing: -0.01em; }

        .nav-links { display: flex; align-items: center; gap: 2rem; list-style: none; }
        .nav-links a { color: var(--text-secondary); text-decoration: none; font-size: 0.875rem; font-weight: 450; transition: color 0.2s; }
        .nav-links a:hover { color: var(--text-primary); }
        .nav-cta {
            background: var(--gradient-netherite); color: white !important;
            padding: 0.5rem 1.25rem; border-radius: 8px;
            font-weight: 500; font-size: 0.85rem !important;
            transition: opacity 0.2s, transform 0.2s !important;
        }
        .nav-cta:hover { opacity: 0.9; transform: translateY(-1px); }

        /* ── 404 Content ── */
        .not-found {
            flex: 1;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            padding: 120px 2rem 80px;
            text-align: center;
            position: relative;
        }

        .not-found::before {
            content: '';
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(217, 119, 6, 0.06) 0%, transparent 60%);
            pointer-events: none;
        }

        .not-found-code {
            font-size: clamp(6rem, 15vw, 10rem);
            font-weight: 900;
            letter-spacing: -0.04em;
            line-height: 1;
            background: var(--gradient-netherite);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            position: relative;
            z-index: 1;
            margin-bottom: 8px;
            opacity: 0;
            animation: fadeIn 600ms cubic-bezier(0.16, 1, 0.3, 1) 100ms forwards;
        }

        .not-found-title {
            font-size: clamp(1.25rem, 3vw, 1.75rem);
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: 12px;
            position: relative; z-index: 1;
            opacity: 0;
            animation: fadeIn 600ms cubic-bezier(0.16, 1, 0.3, 1) 200ms forwards;
        }

        .not-found-desc {
            font-size: 15px;
            color: var(--text-secondary);
            max-width: 420px;
            margin-bottom: 32px;
            position: relative; z-index: 1;
            opacity: 0;
            animation: fadeIn 600ms cubic-bezier(0.16, 1, 0.3, 1) 300ms forwards;
        }

        .not-found-actions {
            display: flex; gap: 12px; flex-wrap: wrap;
            justify-content: center;
            position: relative; z-index: 1;
            opacity: 0;
            animation: fadeIn 600ms cubic-bezier(0.16, 1, 0.3, 1) 400ms forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .btn-primary {
            display: inline-flex; align-items: center; gap: 8px;
            padding: 12px 28px; border-radius: 12px; border: none;
            background: var(--gradient-netherite); color: white;
            font-size: 15px; font-weight: 600; font-family: inherit;
            cursor: pointer; transition: all 0.25s;
            box-shadow: 0 4px 24px rgba(217, 119, 6, 0.25);
            text-decoration: none;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 40px rgba(217, 119, 6, 0.35);
        }
        .btn-primary svg { width: 16px; height: 16px; }

        .btn-secondary {
            display: inline-flex; align-items: center; gap: 8px;
            padding: 12px 28px; border-radius: 12px;
            border: 1px solid var(--border-subtle);
            background: var(--bg-card); color: var(--text-primary);
            font-size: 15px; font-weight: 500; font-family: inherit;
            cursor: pointer; transition: all 0.25s;
            text-decoration: none;
        }
        .btn-secondary:hover {
            border-color: var(--border-hover);
            transform: translateY(-1px);
        }

        /* ── Footer ── */
        footer {
            border-top: 1px solid var(--border-subtle);
            padding: 3rem 2rem; background: var(--bg-primary);
        }
        .footer-inner {
            max-width: 680px; margin: 0 auto;
            display: flex; align-items: center; justify-content: space-between;
        }
        .footer-brand { display: flex; align-items: center; gap: 0.6rem; }
        .footer-brand img { width: 22px; height: 22px; border-radius: 5px; }
        .footer-brand span { font-weight: 500; font-size: 0.9rem; color: var(--text-secondary); }
        .footer-copy { color: var(--text-tertiary); font-size: 0.8rem; }

        /* ── Responsive ── */
        @media (max-width: 640px) {
            nav { padding: 0 1.25rem; }
            .nav-links li:not(:last-child) { display: none; }
            .not-found { padding: 100px 1.5rem 60px; }
            .not-found-actions { flex-direction: column; width: 100%; max-width: 280px; }
            .btn-primary, .btn-secondary { width: 100%; justify-content: center; }
            .footer-inner { flex-direction: column; gap: 1rem; text-align: center; }
        }

        /* ── Scrollbar ── */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-primary); }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav>
        <a href="index.html" class="nav-brand">
            <img src="assets/loom-icon.png" alt="Loom">
            <span>Loom Launcher</span>
        </a>
        <ul class="nav-links">
            <li><a href="index.html#features">Features</a></li>
            <li><a href="changelog.html">Changelog</a></li>
            <li><a href="download.html">Download</a></li>
            <li><a href="https://github.com/ContiSupplu/Cobble" target="_blank" rel="noopener">GitHub</a></li>
            <li><a href="https://github.com/ContiSupplu/Cobble/releases/latest/download/Loom-Setup-1.6.1.exe" class="nav-cta">Download v1.6</a></li>
        </ul>
    </nav>

    <!-- 404 Content -->
    <div class="not-found">
        <div class="not-found-code">404</div>
        <div class="not-found-title">Page not found</div>
        <div class="not-found-desc">The page you're looking for doesn't exist or may have been moved. Let's get you back on track.</div>
        <div class="not-found-actions">
            <a href="index.html" class="btn-primary">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                Back to Home
            </a>
            <a href="download.html" class="btn-secondary">
                Download Loom
            </a>
        </div>
    </div>

    <!-- Footer -->
    <footer>
        <div class="footer-inner">
            <div class="footer-brand">
                <img src="assets/loom-icon.png" alt="Loom">
                <span>Loom Launcher</span>
            </div>
            <div class="footer-copy">© 2025 Loom. Built with ❤️ for Minecraft.</div>
        </div>
    </footer>
</body>
</html>
