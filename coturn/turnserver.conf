# Loom TURN Server Configuration (coturn)
# Docs: https://github.com/coturn/coturn/wiki

# Network
listening-port=3478
tls-listening-port=5349
min-port=49152
max-port=49200

# Realm — change to your domain
realm=loommc.com

# Authentication — use long-term credentials
# Generate a secret: openssl rand -hex 32
use-auth-secret
static-auth-secret=6302b5829711ae0a13306145693aa40b187da6fb5aaff221b8f28f0c5c583e6b

# Logging
log-file=stdout
verbose

# Performance
total-quota=100
bps-capacity=0
stale-nonce=600

# Security
no-multicast-peers
no-cli
denied-peer-ip=10.0.0.0-10.255.255.255
denied-peer-ip=172.16.0.0-172.31.255.255
denied-peer-ip=192.168.0.0-192.168.255.255
denied-peer-ip=127.0.0.0-127.255.255.255

# Fingerprint for STUN
fingerprint

# For production: uncomment and set your TLS certs
# cert=/etc/ssl/certs/loommc.com.pem
# pkey=/etc/ssl/private/loommc.com.key
